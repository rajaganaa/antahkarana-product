# deployment/docker-compose.yml — Antahkarana MedAssist
# Clean CPU-only local development
# No GPU, no nvidia runtime, no BLIP-2, no vLLM
# Author: RAJAGANAPATHY M, SRM University

version: "3.9"

services:
  antahkarana-backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # ── Vision (GitHub Models / GPT-4o) ──────────────────────────────────
      - GITHUB_TOKEN=${GITHUB_TOKEN}          # required — paste your PAT here

      # ── LLM (Groq) ───────────────────────────────────────────────────────
      - GROQ_API_KEY=${GROQ_API_KEY}          # required — Buddhi fallback LLM

      # ── Optional extras ──────────────────────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}    # kept for compat, not required
      - HF_TOKEN=${HF_TOKEN:-}                # kept for compat, not required

      # ── Always off ───────────────────────────────────────────────────────
      - USE_VLLM=false
      - USE_BLIP2=false

      # ── Data paths ───────────────────────────────────────────────────────
      - MEDASSIST_DATA_DIR=/app/data/drug_guides
      - CHROMA_PATH=/app/data/chroma_db
      - UPLOAD_DIR=/tmp/antahkarana_uploads

    volumes:
      - ../data:/app/data          # drug guide PDFs + chroma_db persist here
      - chroma_data:/app/data/chroma_db

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
